# =============================================================================
# 🛡️ KYVERNO POLICIES — The Gatekeeper Rules
# =============================================================================
# These policies enforce the best practices that Popeye audits for.
# Each policy maps to a specific Popeye finding.
#
# Uses the NEW Kyverno v1alpha1 CEL-based policy API (Kyverno 1.13+)
# =============================================================================

---
# =============================================================================
# POLICY 1: Disallow :latest image tag
# Maps to Popeye: [POP-106] Container image using :latest tag
# =============================================================================
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/description: >-
      Using the :latest tag is not recommended as it leads to unpredictable
      deployments. Specify a specific image version instead.
    policies.kyverno.io/severity: medium
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
  validations:
    - message: >-
        The image tag ':latest' is not allowed. Use a specific version tag
        (e.g., nginx:1.27.3).
      expression: >-
        object.spec.template.spec.containers.all(c,
          !c.image.endsWith(':latest') && c.image.contains(':'))

---
# =============================================================================
# POLICY 2: Require resource limits
# Maps to Popeye: [POP-106] No resource limits, [POP-107] No resource requests
# =============================================================================
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/description: >-
      All containers must define CPU and memory resource requests and limits.
      This prevents resource starvation and ensures proper scheduling.
    policies.kyverno.io/severity: medium
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
  validations:
    - message: >-
        All containers must have CPU and memory requests and limits defined.
      expression: >-
        object.spec.template.spec.containers.all(c,
          has(c.resources) &&
          has(c.resources.requests) &&
          has(c.resources.limits) &&
          has(c.resources.requests.cpu) &&
          has(c.resources.requests.memory) &&
          has(c.resources.limits.cpu) &&
          has(c.resources.limits.memory))

---
# =============================================================================
# POLICY 3: Require liveness and readiness probes
# Maps to Popeye: [POP-100] No liveness probe, [POP-101] No readiness probe
# =============================================================================
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: require-probes
  annotations:
    policies.kyverno.io/title: Require Liveness and Readiness Probes
    policies.kyverno.io/description: >-
      Liveness and readiness probes are required to ensure Kubernetes
      can properly manage container health and traffic routing.
    policies.kyverno.io/severity: medium
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
  validations:
    - message: >-
        All containers must have liveness and readiness probes defined.
      expression: >-
        object.spec.template.spec.containers.all(c,
          has(c.livenessProbe) && has(c.readinessProbe))

---
# =============================================================================
# POLICY 4: Require runAsNonRoot
# Maps to Popeye: [POP-302] Container runs as root
# =============================================================================
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: require-run-as-non-root
  annotations:
    policies.kyverno.io/title: Require Run As Non-Root
    policies.kyverno.io/description: >-
      Containers must run as non-root users for security.
      Running as root can lead to container escape vulnerabilities.
    policies.kyverno.io/severity: high
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
  validations:
    - message: >-
        Containers must set securityContext.runAsNonRoot to true.
      expression: >-
        object.spec.template.spec.containers.all(c,
          has(c.securityContext) &&
          has(c.securityContext.runAsNonRoot) &&
          c.securityContext.runAsNonRoot == true)

---
# =============================================================================
# POLICY 5: Require app and team labels
# Maps to Popeye: Labels best practice
# =============================================================================
apiVersion: policies.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require App and Team Labels
    policies.kyverno.io/description: >-
      All pods must have 'app' and 'team' labels for identification
      and operational management.
    policies.kyverno.io/severity: medium
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets"]
  validations:
    - message: >-
        The labels 'app' and 'team' are required on pod templates.
      expression: >-
        has(object.spec.template.metadata.labels) &&
        has(object.spec.template.metadata.labels.app) &&
        object.spec.template.metadata.labels.app != '' &&
        has(object.spec.template.metadata.labels.team) &&
        object.spec.template.metadata.labels.team != ''

---
# =============================================================================
# POLICY 6 (MUTATE): Auto-add default resource requests
# Bonus: Shows Kyverno's mutation capability
# =============================================================================
apiVersion: policies.kyverno.io/v1alpha1
kind: MutatingPolicy
metadata:
  name: add-default-resources
  annotations:
    policies.kyverno.io/title: Add Default Resource Requests
    policies.kyverno.io/description: >-
      Automatically add default CPU and memory requests if not specified.
      This is a safety net — validation policies still enforce limits.
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
  matchConditions:
    - name: missing-resources
      expression: >-
        object.spec.containers.exists(c, !has(c.resources) || !has(c.resources.requests))
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          object.spec.containers.toList().map(i,
            {"op": "add", "path": "/spec/containers/" + string(i.key) + "/resources/requests",
             "value": {"cpu": "100m", "memory": "128Mi"}}
          ).filter(p, !has(object.spec.containers[int(p.path.split('/')[3])].resources) ||
            !has(object.spec.containers[int(p.path.split('/')[3])].resources.requests))
